name: Sync Notes to Main Vault via PR

on:
  push:
    branches:
      - main
    paths:
      - "obsidian/**"

jobs:
  sync:
    runs-on: ubuntu-latest

    env:
      # --- Customize these per Lean repo ---
      PROJECT_NAME: BookOfProof # e.g. BookOfProof, Topology
      PROJECT_NOTES_FOLDER: BookOfProof_Notes # obsidian subfolder name
      VAULT_TARGET_REPO: notShiroki/notShiroki

    steps:
      # 0. Quick PAT presence & basic health check
      - name: Check VAULT_PAT presence and access
        run: |
          if [ -z "${{ secrets.VAULT_PAT }}" ]; then
            echo "❌ VAULT_PAT is not set in Lean repo secrets."
            exit 1
          fi

          echo "Checking VAULT_PAT access to ${{ env.VAULT_TARGET_REPO }}..."
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.VAULT_PAT }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ env.VAULT_TARGET_REPO }})

          if [ "$HTTP_STATUS" -eq 200 ]; then
            echo "✅ VAULT_PAT is valid for ${{ env.VAULT_TARGET_REPO }}"
          else
            echo "❌ VAULT_PAT cannot access ${{ env.VAULT_TARGET_REPO }}. Status: $HTTP_STATUS"
            exit 1
          fi

      # 1. Checkout this Lean project
      - name: Checkout Lean Project
        uses: actions/checkout@v4
        with:
          path: lean-repo

      # 2. Checkout Main Obsidian Vault using the PAT
      - name: Checkout Main Obsidian Vault
        uses: actions/checkout@v4
        with:
          repository: ${{ env.VAULT_TARGET_REPO }}
          token: ${{ secrets.VAULT_PAT }}
          path: vault-repo

      # 3. Rsync this project's notes into the vault math/<Project>_Notes folder
      - name: Sync Notes into Vault repo
        run: |
          mkdir -p "vault-repo/math/${PROJECT_NOTES_FOLDER}"
          rsync -av --delete \
            "lean-repo/obsidian/${PROJECT_NOTES_FOLDER}/" \
            "vault-repo/math/${PROJECT_NOTES_FOLDER}/"

      # 4. Open or update a PR in the vault repo
      - name: Create/Update PR in Vault
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.VAULT_PAT }}
          path: vault-repo
          commit-message: "Sync notes from ${{ env.PROJECT_NAME }}-Lean"
          branch: "sync/${{ env.PROJECT_NAME }}-notes"
          title: "Sync ${{ env.PROJECT_NAME }} notes from Lean project"
          body: |
            This PR syncs notes from **${{ env.PROJECT_NAME }}-Lean** into:
            `math/${{ env.PROJECT_NOTES_FOLDER }}/`.

            - Trigger commit: ${{ github.event.head_commit.id }}
            - Source repo: ${{ github.repository }}
            - Source branch: ${{ github.ref_name }}

            Please verify:
            - [ ] Notes render correctly in Obsidian
            - [ ] Token is still valid (sync + PR Health Check green)
            - [ ] No unintended deletions outside `math/${{ env.PROJECT_NOTES_FOLDER }}/`

          labels: sync, notes, ${{ env.PROJECT_NAME }}
          author: "github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
          committer: "github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
